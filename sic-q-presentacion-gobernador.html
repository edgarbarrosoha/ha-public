<script>
(function(){
  var P = JSON.parse(document.getElementById('payload').textContent);
  function b64(s){return Uint8Array.from(atob(s), function(c){return c.charCodeAt(0);});}
  async function decrypt(pw){
    var enc = new TextEncoder();
    var km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:b64(P.salt), iterations:P.it, hash:'SHA-256'},
      km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    var pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(P.iv)}, key, b64(P.ct));
    return new TextDecoder().decode(pt);
  }
  var f = document.getElementById('f'), err = document.getElementById('err');
  f.addEventListener('submit', async function(e){
    e.preventDefault();
    err.textContent = '';
    var pw = document.getElementById('pw').value;
    try{
      var html = await decrypt(pw);
      document.open(); document.write(html); document.close();
    }catch(ex){
      err.textContent = 'Contraseña incorrecta.';
      document.getElementById('pw').value = '';
    }
  });
})();
</script>
