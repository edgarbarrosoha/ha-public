<script>
(function(){var P=JSON.parse(document.getElementById('payload').textContent);
function b64(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function dec(pw){var e=new TextEncoder();var km=await crypto.subtle.importKey('raw',e.encode(pw),'PBKDF2',false,['deriveKey']);
var k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(P.salt),iterations:P.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(P.iv)},k,b64(P.ct));return new TextDecoder().decode(pt);}
var f=document.getElementById('f'),err=document.getElementById('err');
f.addEventListener('submit',async function(ev){ev.preventDefault();err.textContent='';
try{var h=await dec(document.getElementById('pw').value);document.open();document.write(h);document.close();}
catch(x){err.textContent='Contraseña incorrecta.';document.getElementById('pw').value='';}});})();
</script></body></html>
